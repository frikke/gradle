plugins {
    id 'java-library'
}

// tag::bundling-attribute[]
configurations {
    implementation {
        attributes {
            attribute(Bundling.BUNDLING_ATTRIBUTE, objects.named(Bundling, Bundling.EXTERNAL))
        }
    }
}
// end::bundling-attribute[]

// tag::target-attribute[]
configurations {
    compileClasspath {
        attributes {
            // tag::target-attribute-single[]
            attribute(TargetConfiguration.TARGET_ATTRIBUTE, objects.named(TargetConfiguration, 'debug'))
            // end::target-attribute-single[]
        }
    }
}
// end::target-attribute[]
